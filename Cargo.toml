[package]
name = "simple-db"
version = "0.1.0"
edition = "2024"
description = "A simple, ergonomic query builder and ORM"
license = "MIT"
# repository = "https://github.com/fsantos12/simple-db"

[dependencies]

# --- Serialization & Formats ---
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"

# --- Types ---
chrono = { version = "0.4.44", features = ["serde"] }
rust_decimal = { version = "1.41.0", features = ["serde-float"] }
uuid = { version = "1.23.0", features = ["v7", "serde"] }

# --- Async & Runtime ---
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"